<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">玄联 · 登录</title>
  <link rel="icon" href="/assets/logo-MsljHAhF.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-primary: #6366f1;
      --c-primary-dark: #4f46e5;
      --c-cyan: #22d3ee;
      --c-purple: #a855f7;
      --c-text: #f1f5f9;
      --c-text-dim: rgba(241,245,249,0.52);
      --c-text-faint: rgba(241,245,249,0.24);
      --c-card: rgba(9,12,26,0.80);
      --c-card-border: rgba(99,102,241,0.22);
      --c-input-bg: rgba(255,255,255,0.042);
      --c-input-border: rgba(255,255,255,0.10);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
      background: #04060f;
      color: var(--c-text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background ────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    #star-canvas { position: absolute; inset: 0; }

    .orb {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
    }
    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle at 40% 40%, rgba(99,102,241,.42) 0%, transparent 65%);
      top: -240px; left: -200px;
      filter: blur(90px);
      animation: orb1 22s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 560px; height: 560px;
      background: radial-gradient(circle at 60% 50%, rgba(34,211,238,.30) 0%, transparent 65%);
      bottom: -180px; right: -160px;
      filter: blur(100px);
      animation: orb2 28s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 440px; height: 440px;
      background: radial-gradient(circle at 50% 50%, rgba(168,85,247,.35) 0%, transparent 65%);
      top: 35%; left: 52%;
      filter: blur(80px);
      animation: orb3 19s ease-in-out infinite alternate;
    }
    .orb-4 {
      width: 320px; height: 320px;
      background: radial-gradient(circle at 50% 50%, rgba(244,63,94,.22) 0%, transparent 65%);
      bottom: 15%; left: 5%;
      filter: blur(80px);
      animation: orb1 25s ease-in-out infinite alternate-reverse;
    }
    @keyframes orb1 { from{transform:translate(0,0) scale(1)} to{transform:translate(70px,90px) scale(1.12)} }
    @keyframes orb2 { from{transform:translate(0,0) scale(1)} to{transform:translate(-80px,-70px) scale(1.18)} }
    @keyframes orb3 { from{transform:translate(0,0) rotate(0deg)} to{transform:translate(-50px,55px) rotate(20deg)} }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.032) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 30%, transparent 80%);
    }

    /* ── Layout ────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ──────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 430px;
      background: var(--c-card);
      border: 1px solid var(--c-card-border);
      border-radius: 20px;
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 40px 100px rgba(0,0,0,.65),
        0 8px 32px rgba(0,0,0,.40),
        inset 0 1px 0 rgba(255,255,255,.06);
      overflow: hidden;
      animation: card-in .55s cubic-bezier(.34,1.4,.64,1) forwards;
      opacity: 0;
    }
    @keyframes card-in {
      from { opacity:0; transform:translateY(32px) scale(.94); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .card-spectrum {
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #818cf8, #22d3ee, #a855f7, #6366f1);
      background-size: 200% 100%;
      animation: spectrum 6s linear infinite;
    }
    @keyframes spectrum { from{background-position:0%} to{background-position:200%} }

    .card-body { padding: 40px 44px 36px; }

    /* ── Logo ──────────────────────────────────────── */
    .logo { display: flex; align-items: center; gap: 16px; margin-bottom: 38px; }

    .logo-icon-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .logo-pulse {
      position: absolute; inset: -3px; border-radius: 17px;
      border: 1px solid rgba(99,102,241,.3);
      animation: pulse-ring 3s ease-in-out infinite; opacity: 0;
    }
    @keyframes pulse-ring { 0%{opacity:.6;transform:scale(1)} 100%{opacity:0;transform:scale(1.18)} }
    .logo-icon-bg {
      position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(135deg, rgba(99,102,241,.22), rgba(34,211,238,.12));
      border: 1px solid rgba(99,102,241,.35);
      box-shadow: 0 4px 14px rgba(99,102,241,.18), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .logo-icon-inner {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; color: #818cf8;
    }
    .logo-icon-inner svg { width: 24px; height: 24px; }

    .logo-text h1 {
      font-size: 1.42rem; font-weight: 700; letter-spacing: -.03em; line-height: 1.15;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-text p { font-size: .76rem; color: var(--c-text-dim); margin-top: 3px; letter-spacing: .05em; }

    /* ── Divider ───────────────────────────────────── */
    .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(99,102,241,.3), transparent);
    }
    .divider-line.r { background: linear-gradient(270deg, rgba(99,102,241,.3), transparent); }
    .divider-text {
      font-size: .68rem; font-weight: 600;
      color: rgba(99,102,241,.75); text-transform: uppercase; letter-spacing: .14em;
    }

    /* ── Form ──────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field-label { font-size: .74rem; font-weight: 500; color: var(--c-text-dim); }

    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-ico {
      position: absolute; left: 14px; pointer-events: none;
      color: var(--c-text-faint); display: flex; transition: color .2s;
    }
    .input-ico svg { width: 15px; height: 15px; }
    .input-wrap:focus-within .input-ico { color: rgba(99,102,241,.7); }

    .field input {
      width: 100%; height: 46px; padding: 0 44px 0 42px;
      background: var(--c-input-bg); border: 1px solid var(--c-input-border);
      border-radius: 10px; color: var(--c-text); font-size: .9rem; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field input:focus {
      border-color: rgba(99,102,241,.55);
      box-shadow: 0 0 0 3px rgba(99,102,241,.11);
      background: rgba(99,102,241,.04);
    }
    .field input::placeholder { color: var(--c-text-faint); }
    .field input.otp {
      letter-spacing: .45em; font-size: 1.05rem; text-align: center; padding: 0 14px;
    }

    .eye-btn {
      position: absolute; right: 10px;
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      background: transparent; border: none; color: var(--c-text-faint);
      cursor: pointer; border-radius: 7px; transition: color .15s, background .15s;
    }
    .eye-btn:hover { color: var(--c-text-dim); background: rgba(255,255,255,.05); }
    .eye-btn svg { width: 15px; height: 15px; }

    #otp-field { display: none; }
    #otp-field.show { display: flex; }

    /* ── Error ─────────────────────────────────────── */
    #error-box {
      display: none; align-items: flex-start; gap: 10px;
      padding: 12px 15px; border-radius: 9px;
      background: rgba(239,68,68,.09); border: 1px solid rgba(239,68,68,.22);
      color: #fca5a5; font-size: .83rem; line-height: 1.45;
    }
    #error-box.show { display: flex; animation: shake .38s ease; }
    #error-box svg { width: 14px; height: 14px; flex-shrink: 0; color: #f87171; margin-top: 1px; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 18%{transform:translateX(-7px)}
      36%{transform:translateX(7px)} 54%{transform:translateX(-4px)} 72%{transform:translateX(4px)}
    }

    /* ── Button ────────────────────────────────────── */
    .login-btn {
      position: relative; width: 100%; height: 48px; margin-top: 4px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 60%, #7c3aed 100%);
      color: #fff; border: none; border-radius: 11px;
      font-size: .92rem; font-weight: 600; font-family: inherit; letter-spacing: .04em;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s, opacity .15s;
      box-shadow: 0 4px 18px rgba(99,102,241,.38), 0 1px 4px rgba(0,0,0,.25);
    }
    .login-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.15) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0s;
    }
    .login-btn:hover:not(:disabled)::after { transform: translateX(100%); transition: transform .5s ease; }
    .login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.48); }
    .login-btn:active:not(:disabled) { transform: translateY(0); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .login-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.28); border-top-color: #fff;
      border-radius: 50%; animation: spin .62s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Footer ────────────────────────────────────── */
    .card-footer {
      padding: 18px 44px 24px;
      border-top: 1px solid rgba(255,255,255,.045);
      display: flex; align-items: center; justify-content: space-between;
    }
    .status { display: flex; align-items: center; gap: 7px; font-size: .71rem; color: var(--c-text-faint); }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,.7);
      animation: pdot 2.5s ease-in-out infinite;
    }
    @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .ver {
      font-size: .68rem; color: var(--c-text-faint);
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
      border-radius: 6px; padding: 3px 8px;
    }

    /* ── Lang switcher ─────────────────────────────── */
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .lang-btn {
      padding: 3px 9px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.12);
      background: transparent;
      color: var(--c-text-faint);
      font-size: .68rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: .06em;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .lang-btn:hover { color: var(--c-text-dim); border-color: rgba(255,255,255,.22); }
    .lang-btn.active {
      border-color: rgba(99,102,241,.5);
      color: #818cf8;
      background: rgba(99,102,241,.1);
    }

    @media (max-width: 480px) {
      .card-body { padding: 32px 28px 28px; }
      .card-footer { padding: 16px 28px 22px; }
    }
  </style>
</head>
<body>

<div class="bg">
  <canvas id="star-canvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="grid"></div>
</div>

<div class="page">
  <div class="card">
    <div class="card-spectrum"></div>
    <div class="card-body">

      <div class="logo">
        <div class="logo-icon-wrap">
          <div class="logo-pulse"></div>
          <div class="logo-icon-bg"></div>
          <div class="logo-icon-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
        </div>
        <div class="logo-text">
          <h1 id="logo-title">玄联</h1>
          <p id="logo-subtitle">安全控制管理系统</p>
        </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text" id="divider-text">管理员登录</span>
        <div class="divider-line r"></div>
      </div>

      <form class="form" id="login-form" method="post" novalidate>
        <div class="field">
          <label class="field-label" id="label-user" for="inp-user">用户名</label>
          <div class="input-wrap">
            <span class="input-ico">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>

        <div class="field">

            </span>
            <input type="password" id="inp-pw" placeholder="请输入密码"
              autocomplete="current-password" />
            <button type="button" class="eye-btn" id="eye-btn" tabindex="-1">
              <svg id="eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field" id="otp-field">
          <label class="field-label" id="label-otp" for="inp-otp">双因素验证码 (TOTP)</label>
          <div class="input-wrap">
            <span class="input-ico">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18"/>
              </svg>
            </span>
            <input type="text" id="inp-otp" class="otp" placeholder="••••••"
              maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
          </div>
        </div>

        <div id="error-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="error-text"></span>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span class="spinner" id="spinner" style="display:none"></span>
          <span id="btn-txt">登 录</span>
        </button>
      </form>
    </div>

    <div class="card-footer">
      <div class="status">
        <div class="status-dot"></div>
        <span id="status-text">服务运行正常</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="lang-switcher">
          <button class="lang-btn" id="lang-zh" onclick="applyLang('zh')">ZH</button>
          <button class="lang-btn" id="lang-en" onclick="applyLang('en')">EN</button>
        </div>
        <span class="ver">v0.2.5</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Stars (safe, no broken color conversion) ─────────────────
(function () {
  var canvas = document.getElementById('star-canvas')
  var ctx = canvas.getContext('2d')
  var w = 0, h = 0, t = 0
  var RGBA = [
    [129,140,248], [103,232,249], [192,132,252], [244,114,182], [165,243,252]
  ]
  var stars = []

  function resize() {
    w = canvas.width = window.innerWidth
    h = canvas.height = window.innerHeight
    var n = Math.min(Math.floor(w * h / 4200), 300)
    stars = []
    for (var i = 0; i < n; i++) {
      var c = RGBA[Math.floor(Math.random() * RGBA.length)]
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.3 + 0.15,
        a: Math.random() * 0.65 + 0.12,
        phase: Math.random() * Math.PI * 2,
        spd: Math.random() * 0.35 + 0.07,
        dx: (Math.random() - 0.5) * 0.09,
        dy: (Math.random() - 0.5) * 0.07,
        r0: c[0], g0: c[1], b0: c[2]
      })
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h)
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i]
      var alpha = s.a * (0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.phase + t * s.spd)))
      if (s.r > 0.7) {
        ctx.globalAlpha = alpha * 0.12
        ctx.fillStyle = 'rgb(' + s.r0 + ',' + s.g0 + ',' + s.b0 + ')'
        ctx.beginPath()
        ctx.arc(s.x, s.y, s.r * 3.5, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.globalAlpha = alpha
      ctx.fillStyle = 'rgb(' + s.r0 + ',' + s.g0 + ',' + s.b0 + ')'
      ctx.beginPath()
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2)
      ctx.fill()

      s.x += s.dx; s.y += s.dy
      if (s.x < -2) s.x = w + 2; else if (s.x > w + 2) s.x = -2
      if (s.y < -2) s.y = h + 2; else if (s.y > h + 2) s.y = -2
    }
    ctx.globalAlpha = 1
    t += 0.016
    requestAnimationFrame(draw)
  }

  window.addEventListener('resize', resize)
  resize()
  draw()
}())

// ── i18n strings ─────────────────────────────────────────────

    labelUser: '用户名',

    otpPh: '••••••',

    statusText: 'Service running',
    errNoUser: 'Please enter your username',
    errNoPw: 'Please enter your password',
    errNoOtp: 'Please enter your two-factor code',

  }
}

var currentLang = localStorage.getItem('xulink_lang') || 'zh'

function applyLang(lang) {
  currentLang = lang
  localStorage.setItem('xulink_lang', lang)
  var s = STRINGS[lang]
  document.title = s.pageTitle
  document.getElementById('logo-title').textContent = s.logoTitle
  document.getElementById('logo-subtitle').textContent = s.logoSubtitle
  document.getElementById('divider-text').textContent = s.divider
  document.getElementById('label-user').textContent = s.labelUser
  document.getElementById('inp-user').placeholder = s.userPh
  document.getElementById('label-pw').textContent = s.labelPw
  document.getElementById('inp-pw').placeholder = s.pwPh
  document.getElementById('label-otp').textContent = s.labelOtp
  document.getElementById('inp-otp').placeholder = s.otpPh
  document.getElementById('status-text').textContent = s.statusText
  if (!isLoading) {
    document.getElementById('btn-txt').textContent = s.btnTxt
  }
  // update lang button active states
  document.getElementById('lang-zh').classList.toggle('active', lang === 'zh')
  document.getElementById('lang-en').classList.toggle('active', lang === 'en')
  // update html lang attr
  document.getElementById('html-root').lang = lang === 'en' ? 'en' : 'zh-CN'
}

// Apply initial language
var isLoading = false
applyLang(currentLang)

// ── Login logic ──────────────────────────────────────────────
var otpEnabled = false

;(function () {
  fetch('/settings', { credentials: 'include', redirect: 'manual' })
    .then(function (r) {
      if (r.type !== 'opaqueredirect' && r.ok) {
        window.location.href = '/'
      }
    })
    .catch(function () {})

  fetch('/api/auth/status', { credentials: 'include' })
    .then(function (r) { return r.json() })
    .then(function (j) {
      if (j && j.data && j.data.otp_enabled) {
        otpEnabled = true
        document.getElementById('otp-field').classList.add('show')
      }
    })
    .catch(function () {})
}())

document.getElementById('eye-btn').addEventListener('click', function () {
  var inp = document.getElementById('inp-pw')
  var isText = inp.type === 'text'
  inp.type = isText ? 'password' : 'text'
  document.getElementById('eye-svg').innerHTML = isText
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
})

function showError(msg) {
  var box = document.getElementById('error-box')
  document.getElementById('error-text').textContent = msg
  box.classList.remove('show')
  void box.offsetWidth
  box.classList.add('show')
}

function setLoading(on) {
  var btn = document.getElementById('login-btn')
  var spinner = document.getElementById('spinner')
  var icon = document.getElementById('btn-icon')
  var txt = document.getElementById('btn-txt')
  var s = STRINGS[currentLang]
  btn.disabled = on
  isLoading = on
  spinner.style.display = on ? 'inline-block' : 'none'
  icon.style.display = on ? 'none' : 'inline-block'
  txt.textContent = on ? s.btnLoading : s.btnTxt
}

document.getElementById('login-form').addEventListener('submit', function (e) {
  e.preventDefault()
  var s = STRINGS[currentLang]

  var username = document.getElementById('inp-user').value.trim()
  if (!username) { showError(s.errNoUser); return }

  var pw = document.getElementById('inp-pw').value
  if (!pw) { showError(s.errNoPw); return }

  var otp = document.getElementById('inp-otp').value.trim()
  if (otpEnabled && !otp) { showError(s.errNoOtp); return }
  if (otpEnabled && otp.length !== 6) { showError(s.errOtpLen); return }

  setLoading(true)

  var payload = { username: username, password: pw }
  if (otpEnabled) payload.otp_code = otp

  fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify(payload)
  })
  .then(function (resp) {
    return resp.json().then(function (json) {
      if (!resp.ok) {
        showError(json.detail || (s.errLoginFail + ' (' + resp.status + ')'))
        setLoading(false)
        return
      }
      if (json.data && json.data.token) {
        localStorage.setItem('ghost_auth_token', json.data.token)
      }
      window.location.href = '/'
    })
  })
  .catch(function () {
    showError(STRINGS[currentLang].errNoConn)
    setLoading(false)
  })
})

document.getElementById('inp-otp').addEventListener('input', function () {
  if (this.value.length === 6) {
    setTimeout(function () {
      document.getElementById('login-form').dispatchEvent(new Event('submit'))
    }, 80)
  }
})
</script>
</body>
</html>
